services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    image: flowcore-marketing-sensor:dev
    container_name: flowcore-sensor
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - db-data:/data
      - ./src:/app/src
      - ./public:/app/public
      - ./tests:/app/tests
      - ./scripts:/app/scripts
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped

volumes:
  db-data:
    name: flowcore-sensor-db-data
